steps:

# Pull image
- name: 'gcr.io/cloud-builders/docker'
  args: ['pull', 'caddy']

# Authenticate
- name: 'gcr.io/cloud-builders/gcloud'
  args: ['auth', 'configure-docker', 'asia-south1-docker.pkg.dev']

# Tag image
- name: 'gcr.io/cloud-builders/docker'
  args: ['tag', 'caddy', 'asia-south1-docker.pkg.dev/$PROJECT_ID/caddy-repo/caddy-app:latest']

- name: 'gcr.io/cloud-builders/docker'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      docker run --rm anchore/grype caddy -o csv > result-$BUILD_ID.csv

# Push image
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'asia-south1-docker.pkg.dev/$PROJECT_ID/caddy-repo/caddy-app:latest']

# Upload result
- name: 'gcr.io/cloud-builders/gsutil'
  args: ['cp', 'result-$BUILD_ID.csv', 'gs://darp-grype-bucket-123/']

options:
  logging: CLOUD_LOGGING_ONLY
