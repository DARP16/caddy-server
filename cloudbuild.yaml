steps:

# Pull image
- name: 'gcr.io/cloud-builders/docker'
  args: ['pull', 'caddy']

# Authenticate
- name: 'gcr.io/cloud-builders/gcloud'
  args: ['auth', 'configure-docker', 'asia-south1-docker.pkg.dev']

# Tag image
- name: 'gcr.io/cloud-builders/docker'
  args: ['tag', 'caddy', 'asia-south1-docker.pkg.dev/$PROJECT_ID/caddy-repo/caddy-app:latest']

# 🔥 FASTEST Grype scan (NO TAR, NO INSTALL)
- name: 'anchore/grype'
  entrypoint: 'sh'
  args:
    - '-c'
    - |
      grype caddy -o table > result-$BUILD_ID.txt

# Push image
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'asia-south1-docker.pkg.dev/$PROJECT_ID/caddy-repo/caddy-app:latest']

# Upload result
- name: 'gcr.io/cloud-builders/gsutil'
  args: ['cp', 'result-$BUILD_ID.txt', 'gs://darp-grype-bucket-123/']

options:
  logging: CLOUD_LOGGING_ONLY
