steps:

# 🔨 Build Docker image from your repo (GitHub code)
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'caddy-app', '.']

# 🔐 Authenticate Docker with Artifact Registry
- name: 'gcr.io/cloud-builders/gcloud'
  args: ['auth', 'configure-docker', 'asia-south1-docker.pkg.dev']

# 🏷️ Tag image for Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['tag', 'caddy-app', 'asia-south1-docker.pkg.dev/$PROJECT_ID/caddy-repo/caddy-app:latest']

# 🔥 Scan BEFORE push (correct DevSecOps way)
- name: 'gcr.io/cloud-builders/docker'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      docker run --rm \
        -v /var/run/docker.sock:/var/run/docker.sock \
        anchore/grype:latest \
        caddy-app -o table > result-$BUILD_ID.txt

# 🚀 Push image (only after scan)
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'asia-south1-docker.pkg.dev/$PROJECT_ID/caddy-repo/caddy-app:latest']

# ☁️ Upload scan result
- name: 'gcr.io/cloud-builders/gsutil'
  args: ['cp', 'result-$BUILD_ID.txt', 'gs://darp-grype-bucket-123/']

options:
  logging: CLOUD_LOGGING_ONLY
