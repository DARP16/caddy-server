steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t',
      'asia-south1-docker.pkg.dev/$PROJECT_ID/caddy-repo/caddy-app:latest',
      '.'
    ]

  # Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push',
      'asia-south1-docker.pkg.dev/$PROJECT_ID/caddy-repo/caddy-app:latest'
    ]

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/caddy-repo/caddy-app:latest'

options:
  logging: CLOUD_LOGGING_ONLY
